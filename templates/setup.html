<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin | DMS NOC PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #07101e; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; }
        .card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(148, 163, 184, 0.12); backdrop-filter: blur(14px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-blue-600 text-white shadow-lg shadow-blue-500/30">
                <i class="fas fa-user-lock text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">Create Admin Account</h1>
            <p class="mt-2 text-sm text-slate-400">Set up your first administrator for the dashboard.</p>
        </div>
        <div class="card rounded-3xl p-8 shadow-xl shadow-slate-900/40">
            {% if error %}
            <div class="mb-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 p-4 text-sm text-rose-100">
                {{ error }}
            </div>
            {% endif %}
            <form action="{{ url_for('setup') }}" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-300" for="username">Admin username</label>
                    <input id="username" name="username" type="text" required
                        class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300" for="password">Password</label>
                    <input id="password" name="password" type="password" required
                        class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300" for="password_confirm">Confirm password</label>
                    <input id="password_confirm" name="password_confirm" type="password" required
                        class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20" />
                </div>
                <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-500/20 transition hover:bg-blue-500">
                    Create admin account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
